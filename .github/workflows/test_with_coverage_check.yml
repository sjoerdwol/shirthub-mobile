name: Run Tests with Coverage Check

on:
  push: 
    branches: ['main']
  pull_request: 
    branches: ['main']

jobs:
  test:
    name: Run tests and check coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests and check coverage
        run: npm run test
        